<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied | UrbanPulse</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #1e293b;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
        }
        .icon {
            font-size: 60px;
            color: #ef4444;
            margin-bottom: 20px;
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; }
        p { color: #64748b; line-height: 1.6; margin-bottom: 25px; }
        .btn {
            background-color: #667eea;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔒</div>
        <h1>Unauthorized Access</h1>
        <p>This account is not allowed to access the Healthcare Management Portal. Please return to the Citizen Portal or contact your administrator.</p>
        <a href="/citizen" class="btn">Return to Citizen Portal</a>
    </div>
</body>
</html>
