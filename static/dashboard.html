<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanPulse | HQ Command Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .ops-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid #334155; border-radius: 12px; height: 100%; transition: all 0.3s ease; }
        .ops-card:hover { border-color: #6366f1; box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
        .urgent-border { border-left: 5px solid #ef4444; position: relative; animation: blink-border 2s infinite; }
        @keyframes blink-border { 0%, 100% { border-left-color: #ef4444; } 50% { border-left-color: #450a0a; } }
        .log-feed { height: 250px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; padding: 10px; background: #000; border-radius: 8px; color: #94a3b8; }
        .authorize-btn { background: #22c55e; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 800; width: 100%; }
        .sim-btn { font-weight: 700; text-transform: uppercase; font-size: 0.7rem; padding: 8px; }
    </style>
</head>
<body>

<nav class="navbar px-4 py-2 border-bottom border-secondary mb-4">
    <div class="container-fluid">
        <div class="d-flex align-items-center">
            <button onclick="window.location.href='/clinic'" class="btn btn-sm btn-outline-secondary me-3">← Back</button>
            <span class="navbar-brand fw-bold text-uppercase">
                <span class="text-primary">Urban</span>Pulse // <span class="text-white">HQ COMMAND CENTER</span>
            </span>
        </div>
        <div class="d-flex align-items-center gap-3">
            <button onclick="triggerReset()" class="btn btn-sm btn-danger fw-bold">🔄 RESET NATIONAL SYSTEM</button>
            <div class="text-end">
                <div class="small text-muted text-uppercase fw-bold" style="font-size: 0.6rem;">Status</div>
                <div id="global-status-text" class="text-success fw-bold small">● SYSTEM NORMAL</div>
            </div>
        </div>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row mb-4">
        <div class="col-12">
            <div class="ops-card p-3 border-primary" style="background: rgba(37, 99, 235, 0.1);">
                <h6 class="text-primary fw-bold mb-3 text-uppercase" style="font-size: 0.75rem;">🚨 Strategic Simulation Engine</h6>
                <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-outline-success sim-btn" onclick="runHQScenario('low_haze')">🟢 Low Haze</button>
                    <button class="btn btn-outline-warning sim-btn" onclick="runHQScenario('moderate_haze')">🟠 Moderate Haze</button>
                    <button class="btn btn-outline-danger sim-btn" onclick="runHQScenario('severe_haze')">🔴 Severe Haze</button>
                    <div class="vr mx-2"></div>
                    <button class="btn btn-outline-info sim-btn" onclick="runHQScenario('dengue_low')">🦟 Dengue Low</button>
                    <button class="btn btn-outline-info sim-btn" onclick="runHQScenario('dengue_medium')">🦟 Dengue Med</button>
                    <button class="btn btn-outline-info sim-btn" onclick="runHQScenario('dengue_high')">🦟 Dengue High</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="ops-card p-4">
                <h5 class="fw-bold mb-3 text-primary">Live Intervention Map</h5>
                <div id="sg-map" style="height: 500px; border-radius: 12px;"></div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="ops-card p-4 mb-4">
                <h5 class="fw-bold text-info mb-3">🤖 AI Reasoning (Watsonx)</h5>
                <div id="ai-justification" class="p-3 rounded bg-black small border border-secondary mb-3" style="min-height: 80px;">
                    <span class="text-muted">Awaiting strategic trigger...</span>
                </div>
                <div id="action-required" style="display:none;" class="p-3 rounded border border-danger bg-danger bg-opacity-10">
                    <h6 class="text-danger fw-bold small">HQ AUTHORIZATION REQUIRED</h6>
                    <p id="action-msg" class="small mb-3"></p>
                    <button class="authorize-btn" onclick="authorizeNationalDispatch()">AUTHORIZE DISPATCH</button>
                </div>
            </div>

            <div class="ops-card p-4">
                <h5 class="fw-bold text-secondary mb-3">Operational Log</h5>
                <div id="hq-log" class="log-feed">
                    <div>[SYSTEM] UrbanPulse Online. Awaiting telemetry...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Setup Map
    var map = L.map('sg-map').setView([1.3521, 103.8198], 11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);

    function authHeaders() {
        return { 
            "Authorization": `Bearer ${localStorage.getItem('urbanpulse_token')}`,
            "Content-Type": "application/json"
        };
    }

    // 2. TRIGGER FUNCTION (This now moves the Clinic Manager's state too)
    async function runHQScenario(key) {
        logAction(`DEPLOYING STRATEGY: ${key.toUpperCase()}`, "#6366f1");
        try {
            const res = await fetch(`/api/run-scenario/${key}`, { 
                method: 'POST', 
                headers: authHeaders() 
            });
            const data = await res.json();
            
            if (data.status === 'success') {
                document.getElementById('ai-justification').innerText = data.supply_chain_actions.justification;
                document.getElementById('action-msg').innerText = data.healthcare_alerts.alert_message;
                document.getElementById('action-required').style.display = 'block';
                document.getElementById('global-status-text').innerText = "● ALERT ACTIVE";
                document.getElementById('global-status-text').className = "text-danger fw-bold small";
                logAction("AI Agents processing regional impact city-wide...", "#f59e0b");
            }
        } catch (e) { logAction("Trigger Failed: " + e.message, "#ef4444"); }
    }

    // 3. RESET FUNCTION (This wipes the trucks and the server state)
    async function triggerReset() {
        if(!confirm("Initiate National System Reset? This wipes all frontline logistics.")) return;
        
        logAction("INITIATING NATIONAL SYSTEM RESET...", "#ef4444");
        
        // Tell Server to reset
        await fetch('/api/admin-reset', { method: 'POST', headers: authHeaders() });
        
        // Wipe logistics memory for the demo hospital (TTSH)
        const fid = 'ttsh';
        localStorage.removeItem('trucks_' + fid);
        localStorage.removeItem('processed_orders_' + fid);
        localStorage.removeItem('completed_trucks_' + fid);
        localStorage.removeItem('last_order_id_ttsh');
        
        // Ensure the Clinic side knows to refresh
        localStorage.removeItem('last_clinic_reset');
        
        location.reload();
    }

    function logAction(msg, color) {
        const log = document.getElementById('hq-log');
        const time = new Date().toLocaleTimeString('en-GB');
        log.innerHTML = `<div style="color: ${color}">[${time}] - ${msg}</div>` + log.innerHTML;
    }

    function authorizeNationalDispatch() {
        logAction("HQ AUTHORIZATION GRANTED. Dispatched to regional clusters.", "#22c55e");
        alert("Strategic Dispatch Confirmed. Frontline dashboards updated.");
        document.getElementById('action-required').style.display = 'none';
    }
</script>
</body>
</html>
